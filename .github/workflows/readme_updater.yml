name: Update README Automatically

on:
  push:
    branches:
      - main
    paths:
      - '**/*.cpp' # Triggers when ANY .cpp file changes anywhere in the repo

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script to regenerate table
        run: python .github/scripts/generate_readme.py

      - name: Commit and push changes if README changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README.md"
          else
            git commit -m "docs: auto-update tracking table in README"
            git push
          fi
